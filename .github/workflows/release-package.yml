name: Release and Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, Test & Dry-run Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://npm.pkg.github.com'
          scope: '@captain-os'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

      - name: Verify Package Config
        run: |
          echo "Verifying package.json structures..."
          node -e "const pkg = require('./package.json'); if (!pkg.name || !pkg.version) throw new Error('Root package.json lacks name or version');"
          node -e "const corePkg = require('./packages/core/package.json'); if (!corePkg.name || !corePkg.version) throw new Error('Core package.json lacks name or version');"
          echo "All packages verified successfully!"

      - name: Dry-Run NPM Publish
        run: |
          echo "Simulating package publication..."
          npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
